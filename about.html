<html lang="en">

  <title>About Me — Peninsula Prep</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap">
  <style>
    :root {
      --dark: #1A1A2E; --dark2: #14142A; --gold: #FFB432; --gold2: #E89E20;
      --cream: #FFFAF4; --tan: #F0EAE0; --text: #1A1A2E; --muted: #6B6880;
      --border: #E0D8CC; --green: #3BA37A;
      --font-display: 'Syne', sans-serif; --font-body: 'Instrument Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background-color: var(--cream); color: var(--text); line-height: 1.6; font-size: 16px; }
    h1, h2, h3 { font-family: var(--font-display); }
    
    .navbar { position: sticky; top: 0; height: 60px; background-color: var(--dark); display: flex; align-items: center; z-index: 1000; }
    .nav-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--font-display); font-weight: 700; font-size: 20px; color: #fff; text-decoration: none; }
    .logo span { color: var(--gold); }
    .nav-links { display: flex; align-items: center; gap: 2rem; }
    .nav-link { font-size: 14px; font-weight: 500; color: rgba(255, 255, 255, 0.65); text-decoration: none; transition: color 0.2s ease; }
    .nav-link:hover, .nav-link.active { color: #fff; }
    
    .page-header { background-color: var(--dark); color: #fff; padding: 4rem 0 3rem 0; text-align: center; }
    .page-title { font-size: clamp(28px, 4vw, 40px); font-weight: 800; margin-bottom: 0.5rem; }
    
    .container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 4rem 1.5rem; }
    
    .about-grid { display: grid; grid-template-columns: 1fr; gap: 3rem; align-items: start; }
    @media (min-width: 768px) { .about-grid { grid-template-columns: 350px 1fr; } }
