<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Register — Peninsula Prep</title></head>
<body>
  <div style="max-width: 600px; margin: 4rem auto;">
    <h1>Book a Session</h1>
    <form id="register-form">
      <input type="text" name="Name" placeholder="Student Name" required><br><br>
      <input type="email" name="Email" placeholder="Parent/Student Email" required><br><br>
      
      <label>Grade Level</label><br>
      <select name="Grade" required>
        <option value="Elementary">Elementary (K-5)</option>
        <option value="Middle School">Middle School (6-8)</option>
        <option value="High School">High School (9-12)</option>
      </select><br><br>
      
      <input type="text" name="Subject" placeholder="Subject" required><br><br>
      <button type="submit">Request Session</button>
    </form>
  </div>
  <script>
    window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
    formspree('initForm', { formElement: '#register-form', formId: 'mwvjkbvb' });
  </script>
  <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
</body>
</html>
